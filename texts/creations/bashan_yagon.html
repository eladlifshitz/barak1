
<p>
<p dir="rtl">
עם התפקחות התבונה,</p>

</p>
<p>
<p dir="rtl">
יוצא האדם במחולות עזים,</p>

</p>
<p>
<p dir="rtl">
ויוצר התקרבות ממשית אל עצמו.</p>

</p>
<p>
<p dir="rtl">
בו בזמן, הוא מקל על הלב,</p>

</p>
<p>
<p dir="rtl">
באהדה קולנית וחשוכת יגון</p>

</p>
<p>
<p dir="rtl">
<em>(בשן אור, מתוך "הגיגי חכמה ומזמורים")</em></p>

</p>
