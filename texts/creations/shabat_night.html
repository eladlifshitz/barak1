
<p>
<p dir="rtl">
ליל השבת הבוער בנשמת האדם, הוא-הוא התופן.</p>

</p>
<p>
<p dir="rtl">
למענו, האדם בוצע מנפשו, מחייה אדמות ושדות, ומזיל זעתו.</p>

</p>
<p>
<p dir="rtl">
וכאשר מגיעה השבת לדלתו, מקבל אותה ומתייחד איתה, ולו לרגע אחד.</p>

</p>
<p>
<p dir="rtl">
<em>(בשן אור, מתוך "הגיגי חכמה ומזמורים")</em></p>

</p>
