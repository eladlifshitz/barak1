<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; text-align: center; }
        header { background: var(--primary); color: white; padding: 40px; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .hero { display: flex; flex-wrap: wrap; gap: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; align-items: center; }
        .hero-img img { width: 100%; max-width: 300px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .error-msg { color: red; background: #ffdada; padding: 10px; border-radius: 5px; margin: 10px; display: none; }
        h2 { border-bottom: 3px solid var(--accent); display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h1>ברק לב שלם</h1>
    <p>מנציחים את החיוך והדרך</p>
</header>

<div class="container">
    <div id="error-log" class="error-msg"></div>

    <section class="hero">
        <div class="hero-img" id="main-photo">טוען תמונה...</div>
        <div style="flex:1; text-align:right; border-right: 4px solid var(--accent); padding-right: 20px;">
            <h3 style="color:var(--accent)">בדיחה של ברק:</h3>
            <div id="random-joke" style="font-size:1.2em; font-style:italic;">טוען חיוך...</div>
        </div>
    </section>

    <h2>גלריה</h2>
    <div id="images-grid" class="grid">טוען תמונות...</div>

    <h2 style="margin-top:40px;">מסמכים וסיפורים</h2>
    <div id="docs-list" class="grid">טוען מסמכים...</div>
</div>

<script>
    const API_KEY = 'AIzaSyCKS2dCoAP3FJBlB-qp_qE9bsCAyyIv1vA';
    const FOLDER_PHOTOS = '1jhuCr8n8QPxhv81QBNIlUdvAIfVvKfxV';
    const FOLDER_DOCS = '1gGFrPezqD4-V9sAHt-6du6dltyMrmtqY';
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv';

    function showError(msg) {
        const div = document.getElementById('error-log');
        div.style.display = 'block';
        div.innerText += msg + "\n";
    }

    async function loadAll() {
        // טעינת בדיחות (כבר עובד)
        try {
            const res = await fetch(SHEET_CSV);
            const data = await res.text();
            const rows = data.split('\n').slice(1).map(r => r.split(','));
            const random = rows[Math.floor(Math.random() * rows.length)];
            document.getElementById('random-joke').innerText = `"${random[0]}"`;
        } catch(e) { showError("שגיאה בטעינת בדיחות"); }

        // טעינת תמונות
        const driveUrl = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_PHOTOS}'+in+parent&fields=files(id,name)&key=${API_KEY}`;
        try {
            const res = await fetch(driveUrl);
            const data = await res.json();
            if (data.error) {
                showError("שגיאת דרייב: " + data.error.message);
            } else if (data.files) {
                const grid = document.getElementById('images-grid');
                grid.innerHTML = data.files.map(f => `
                    <div class="card">
                        <img src="https://lh3.googleusercontent.com/d/${f.id}">
                        <p>${f.name.split('.')[0]}</p>
                    </div>
                `).join('');
                document.getElementById('main-photo').innerHTML = `<img src="https://lh3.googleusercontent.com/d/${data.files[0].id}">`;
            }
        } catch(e) { showError("שגיאה בחיבור לדרייב"); }

        // טעינת מסמכים
        const docsUrl = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_DOCS}'+in+parent&fields=files(id,name)&key=${API_KEY}`;
        try {
            const res = await fetch(docsUrl);
            const data = await res.json();
            if (data.files) {
                document.getElementById('docs-list').innerHTML = data.files.map(d => `
                    <div class="card">
                        <h3>${d.name}</h3>
                        <a href="https://docs.google.com/document/d/${d.id}/view" target="_blank">קרא עוד ←</a>
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }

    loadAll();
</script>
</body>
</html>
