<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; color: #333; scroll-behavior: smooth; }
        
        header { background: var(--primary-color); color: white; padding: 2rem; text-align: center; }
        nav { background: #34495e; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        
        /* דף שער - Hero */
        .hero { display: flex; gap: 30px; align-items: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; flex-wrap: wrap; }
        .hero-img-box { flex: 0 0 300px; text-align: center; }
        .hero-img-box img { width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .random-box { flex: 1; padding: 20px; border-right: 6px solid var(--accent-color); min-width: 300px; }

        /* גריד כרטיסים */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); transition: 0.3s; position: relative; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .card img { width: 100%; border-radius: 8px; height: 200px; object-fit: cover; margin-bottom: 10px; }
        
        .joke-text { font-style: italic; font-size: 1.2em; color: var(--primary-color); line-height: 1.5; }
        .tag { display: inline-block; background: #fff3e0; color: var(--accent-color); padding: 4px 12px; border-radius: 20px; font-size: 0.8em; margin-bottom: 10px; font-weight: bold; }
        .author-tag { font-size: 0.9em; color: #7f8c8d; margin-top: 10px; font-weight: bold; }

        h2 { border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; margin-top: 60px; color: var(--primary-color); }

        /* Lightbox לתמונות */
        #lightbox { display: none; position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 10px; }

        /* מגירה לטקסטים (Modal) */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 800px; max-height: 85vh; border-radius: 20px; overflow-y: auto; padding: 50px 40px; position: relative; line-height: 1.8; text-align: right; }
        .close-modal { position: absolute; top: 20px; left: 25px; font-size: 35px; cursor: pointer; color: #999; }

        @media (max-width: 768px) { .hero { flex-direction: column; text-align: center; } .random-box { border-right: none; border-top: 4px solid var(--accent-color); } }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

<div id="text-modal" class="modal" onclick="closeTextModal()"><div class="modal-content" onclick="event.stopPropagation()"><span class="close-modal" onclick="closeTextModal()">&times;</span><div id="text-display-area">טוען...</div></div></div>

<header>
    <h1>ברק לב שלם</h1>
    <p>האתר לזכרו - חיוך, בדיחות וזכרונות</p>
</header>

<nav>
    <a href="#home">בית</a>
    <a href="#gallery">גלריה</a>
    <a href="#creations">היצירה של ברק</a>
    <a href="#stories">מספרים על ברק</a>
    <a href="#jokes">בדיחות</a>
</nav>

<div class="container">
    <section id="home" class="hero">
        <div class="hero-img-box" id="hero-photo"></div>
        <div class="random-box">
            <h3>בדיחה של ברק:</h3>
            <div id="random-joke" class="joke-text">טוען חיוך...</div>
            <button onclick="displayRandomHero()" style="margin-top:20px; cursor:pointer; background:none; border:1px solid var(--accent-color); color:var(--accent-color); padding:5px 15px; border-radius:20px;">החלף בדיחה</button>
        </div>
    </section>

    <section id="gallery"><h2>גלריית תמונות</h2><div id="gallery-content">טוען...</div></section>
    <section id="creations"><h2>היצירה של ברק</h2><div id="creations-list" class="grid">טוען...</div></section>
    <section id="stories"><h2>מספרים על ברק</h2><div id="stories-list" class="grid">טוען...</div></section>
    <section id="jokes"><h2>מאגר הבדיחות</h2><div id="all-jokes-grid" class="grid">טוען...</div></section>
</div>

<script>
    const JOKES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv';
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQejae0pWcPjbYrlj7cwqBPRxHN8o7hU0arrWV4QEVs3ap-VbhkvPjjhIsnXIovjQMggYbMbd0lwLe_/pub?gid=0&single=true&output=csv';
    const TEXTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSug0ITKEUEv_ds_rZkbz4c16B8eLQHwpbrsukCpYAOzYpvBz_1K0M_eIt9Ge4BuXk3Ckn6iOHJ2kGk/pub?output=csv';

    let jokes = [], photos = [], texts = [];

    async function init() {
        try {
            const [jRes, pRes, tRes] = await Promise.all([fetchData(JOKES_URL, true), fetchData(PHOTOS_URL, false), fetchData(TEXTS_URL, true)]);
            jokes = jRes; photos = pRes.slice(1); texts = tRes;
            displayRandomHero(); renderGallery(); renderTexts(); renderAllJokes();
        } catch (e) { console.error(e); }
    }

    function fetchData(url, header) { return new Promise(res => Papa.parse(url, { download: true, header, skipEmptyLines: true, complete: r => res(r.data) })); }

    function displayRandomHero() {
        if(jokes.length) document.getElementById('random-joke').innerText = `"${jokes[Math.floor(Math.random()*jokes.length)]['Joke Content']}"`;
        if(photos.length) document.getElementById('hero-photo').innerHTML = `<img src="https://lh3.googleusercontent.com/u/0/d/${photos[Math.floor(Math.random()*photos.length)][1]}">`;
    }

    function renderGallery() {
        const container = document.getElementById('gallery-content'), albums = {};
        photos.forEach(r => { if(r[1] && r[2]) { if(!albums[r[2]]) albums[r[2]] = []; albums[r[2]].push(r); }});
        let h = '';
        for(const [t, items] of Object.entries(albums)) {
            h += `<h3>${t}</h3><div class="grid" style="margin-bottom:40px;">${items.map(p => `<div class="card" onclick="openImg('https://lh3.googleusercontent.com/u/0/d/${p[1]}')"><img src="https://lh3.googleusercontent.com/u/0/d/${p[1]}"><p style="text-align:center">${p[0]}</p></div>`).join('')}</div>`;
        }
        container.innerHTML = h;
    }

    function renderTexts() {
        const cBox = document.getElementById('creations-list'), sBox = document.getElementById('stories-list');
        let cH = '', sH = '';
        texts.forEach(item => {
            const card = `<div class="card" onclick="openText('${item.Link}')"><span class="tag">${item.Type}</span><h4>${item.Title}</h4>${item.Author ? `<p class="author-tag">מאת: ${item.Author}</p>` : ''}</div>`;
            if(item.Type.includes("היצירה")) cH += card; else sH += card;
        });
        cBox.innerHTML = cH || '<p>בקרוב...</p>'; sBox.innerHTML = sH || '<p>בקרוב...</p>';
    }

    function renderAllJokes() {
        document.getElementById('all-jokes-grid').innerHTML = jokes.map(j => `<div class="card"><p class="joke-text">"${j['Joke Content']}"</p><span class="tag">${j['Categories'] || 'כללי'}</span></div>`).join('');
    }

    function openImg(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
    
    async function openText(path) {
    const modal = document.getElementById('text-modal');
    const area = document.getElementById('text-display-area');
    
    modal.style.display = 'flex';
    area.innerHTML = '<p style="text-align:center;">טוען את המילים...</p>';

    // ניקוי הנתיב מרווחים מיותרים אם יש
    const cleanPath = path.trim();
    
    try {
        // ניסיון טעינה
        const response = await fetch('texts/' + cleanPath);
        
        if (!response.ok) {
            throw new Error(`לא הצלחתי למצוא את הקובץ בכתובת: texts/${cleanPath}`);
        }
        
        const htmlContent = await response.text();
        area.innerHTML = htmlContent;
        
        // גלילה חזרה למעלה בתוך המודל
        document.querySelector('.modal-content').scrollTop = 0;
        
    } catch (e) {
        console.error(e);
        area.innerHTML = `
            <div style="text-align:center; color:red; padding:20px;">
                <p><strong>שגיאה בטעינת הקטע</strong></p>
                <p style="font-size:0.8em;">${e.message}</p>
                <p style="font-size:0.8em; color:gray;">וודא שהקובץ קיים ב-GitHub בתיקיית texts ובנתיב המדויק שכתבת בטבלה.</p>
            </div>`;
    }
}

    function closeTextModal() { document.getElementById('text-modal').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
