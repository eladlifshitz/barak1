<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ברק לב שלם - לזכרו</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; text-align: center; padding: 20px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 220px; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        #joke { font-size: 1.5em; margin: 30px; color: #e67e22; font-style: italic; min-height: 50px; }
        #debug-msg { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 5px; margin: 20px auto; max-width: 600px; display: none; direction: ltr; }
    </style>
</head>
<body>
    <h1>ברק לב שלם</h1>
    <div id="debug-msg"></div>
    <div id="joke">טוען חיוך...</div>
    <div id="photos" class="gallery">מחפש תמונות...</div>

    <script>
        const KEY = 'AIzaSyCKS2dCoAP3FJBlB-qp_qE9bsCAyyIv1vA';
        const TARGET_FOLDER = '1jhuCr8n8QPxhv81QBNIlUdvAIfVvKfxV';

        async function loadData() {
            const photosDiv = document.getElementById('photos');
            const debugDiv = document.getElementById('debug-msg');

            // הכתובת הכי בסיסית שיש - רשימת קבצים כללית עם סינון ידני שלנו
            const url = `https://www.googleapis.com/drive/v3/files?fields=files(id,name,parents,mimeType)&key=${KEY}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    debugDiv.style.display = 'block';
                    debugDiv.innerText = `Error ${data.error.code}: ${data.error.message}`;
                    return;
                }

                // סינון ידני: רק קבצים שהאבא שלהם הוא התיקייה של ברק
                const myFiles = data.files.filter(f => 
                    f.parents && f.parents.includes(TARGET_FOLDER) && f.mimeType.includes('image')
                );

                if (myFiles.length > 0) {
                    photosDiv.innerHTML = myFiles.map(f => `
                        <div class="card">
                            <img src="https://lh3.googleusercontent.com/d/${f.id}">
                            <p style="font-weight:bold; margin-top:8px;">${f.name.split('.')[0]}</p>
                        </div>
                    `).join('');
                } else {
                    photosDiv.innerText = "לא הצלחתי למצוא קבצים בתיקייה. וודא שהתמונות בתוך התיקייה ושהיא שיתופית.";
                }
            } catch (e) {
                debugDiv.style.display = 'block';
                debugDiv.innerText = "Connection Failed: " + e.message;
            }
        }

        // טעינת בדיחה
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv')
            .then(r => r.text()).then(t => {
                const r = t.split('\n').slice(1);
                document.getElementById('joke').innerText = `"${r[Math.floor(Math.random() * r.length)].split(',')[0]}"`;
            });

        loadData();
    </script>
</body>
</html>
