<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; text-align: center; }
        header { background: var(--primary); color: white; padding: 40px 20px; }
        nav { background: #34495e; padding: 10px; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .hero { display: flex; flex-wrap: wrap; gap: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; align-items: center; }
        .hero-img { flex: 1; min-width: 300px; }
        .hero-img img { width: 100%; border-radius: 10px; max-height: 400px; object-fit: cover; }
        .random-box { flex: 1; min-width: 300px; padding: 20px; border-right: 4px solid var(--accent); text-align: right; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .joke-text { font-style: italic; font-size: 1.1em; color: var(--primary); margin: 15px 0; display: block; }
        .tag { background: #f0f0f0; padding: 4px 10px; border-radius: 15px; font-size: 0.85em; color: #666; }
        h2 { border-bottom: 3px solid var(--accent); display: inline-block; padding-bottom: 5px; margin-bottom: 30px; }
    </style>
</head>
<body>

<header>
    <h1>ברק לב שלם</h1>
    <p>מנציחים את החיוך, הסיפורים והדרך</p>
</header>

<nav>
    <a href="#home">בית</a>
    <a href="#gallery">תמונות</a>
    <a href="#jokes">בדיחות</a>
</nav>

<div class="container">
    <section id="home" class="hero">
        <div class="hero-img" id="main-photo-container">
            <p>טוען תמונה ראשית...</p>
        </div>
        <div class="random-box">
            <h3 style="color: var(--accent);">בדיחה של ברק:</h3>
            <div id="random-joke" class="joke-text">טוען בדיחה מחייכת...</div>
        </div>
    </section>

    <section id="gallery">
        <h2>גלריית זיכרונות</h2>
        <div id="images-grid" class="grid">טוען תמונות מהדרייב...</div>
    </section>

    <section id="jokes" style="margin-top: 60px;">
        <h2>מאגר הבדיחות של ברק</h2>
        <div id="all-jokes" class="grid">טוען את המאגר...</div>
    </section>
</div>

        try {

                const random = rows[Math.floor(Math.random() * rows.length)];
                document.getElementById('random-joke').innerText = `"${random[0]}"`;

                const jokesHtml = rows.map(r => `
                    <div class="card">
                        <span class="joke-text">"${r[0]}"</span>
                        <span class="tag">${r[1] || 'כללי'}</span>
                    </div>
                `).join('');
                document.getElementById('all-jokes').innerHTML = jokesHtml;
            }

                // תמונה ראשית
                const mainId = driveData.files[0].id;
                document.getElementById('main-photo-container').innerHTML = `<img src="https://lh3.googleusercontent.com/u/0/d/${mainId}" alt="ברק">`;

                // גלריה
                const galleryHtml = driveData.files.map(f => `
                    <div class="card">
                        <img src="https://lh3.googleusercontent.com/u/0/d/${f.id}" alt="${f.name}">

                    </div>
                `).join('');
                document.getElementById('images-grid').innerHTML = galleryHtml;
            } else {
