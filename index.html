<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ברק לב שלם - זיכרון</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fdfdfd; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .card { border: 1px solid #eee; padding: 10px; width: 220px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        #joke { font-size: 1.5em; margin: 30px auto; color: #e67e22; max-width: 700px; font-style: italic; }
        #debug { color: red; background: #f9f9f9; padding: 10px; border: 1px solid red; display: none; margin: 10px; text-align: left; direction: ltr; }
    </style>
</head>
<body>
    <h1>לזכרו של ברק לב שלם</h1>
    
    <div id="debug"></div>
    <div id="joke">טוען בדיחה מחייכת...</div>

    <hr style="width: 50%; opacity: 0.3;">
    
    <h2>גלריית תמונות</h2>
    <div id="photos" class="gallery">טוען תמונות...</div>

    <script>
        const KEY = 'AIzaSyCKS2dCoAP3FJBlB-qp_qE9bsCAyyIv1vA';
        const FOLDER = '1jhuCr8n8QPxhv81QBNIlUdvAIfVvKfxV';

        async function start() {
            const photosDiv = document.getElementById('photos');
            const debugDiv = document.getElementById('debug');

            // בניית השאילתה בצורה הכי בטוחה שיש
            const q = `'${FOLDER}' in parent and mimeType contains 'image/'`;
            const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&key=${KEY}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    debugDiv.style.display = 'block';
                    debugDiv.innerText = "Google Error: " + data.error.message;
                    return;
                }

                if (data.files && data.files.length > 0) {
                    photosDiv.innerHTML = data.files.map(f => {
                        // שימוש בלינק תצוגה מקדימה פשוט
                        const imgUrl = `https://lh3.googleusercontent.com/u/0/d/${f.id}`;
                        return `
                            <div class="card">
                                <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/200?text=תמונה'">
                                <p style="font-size:0.9em; margin-top:8px;">${f.name.split('.')[0]}</p>
                            </div>
                        `;
                    }).join('');
                } else {
                    photosDiv.innerText = "לא נמצאו תמונות בתיקייה. וודא שהן שם וששיתפת אותה לכולם.";
                }
            } catch (e) {
                debugDiv.style.display = 'block';
                debugDiv.innerText = "Connection Error: " + e.message;
            }
        }

        // טעינת בדיחה (כבר עובד מצוין)
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv')
            .then(r => r.text()).then(text => {
                const rows = text.split('\n').slice(1);
                if(rows.length > 0) {
                    const randomRow = rows[Math.floor(Math.random() * rows.length)];
                    document.getElementById('joke').innerText = `"${randomRow.split(',')[0]}"`;
                }
            });

        start();
    </script>
</body>
</html>
