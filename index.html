<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; color: #333; scroll-behavior: smooth; }
        
        header { background: var(--primary-color); color: white; padding: 2rem; text-align: center; }
        nav { background: #34495e; padding: 10px; text-align: center; sticky; top: 0; z-index: 100; position: sticky; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        
        /* דף שער - Hero */
        .hero { display: flex; gap: 30px; align-items: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; flex-wrap: wrap; }
        .hero-img-box { flex: 0 0 300px; text-align: center; }
        .hero-img-box img { width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .random-box { flex: 1; padding: 20px; border-right: 6px solid var(--accent-color); min-width: 300px; }
        .random-box h3 { margin-top: 0; color: var(--accent-color); }

        /* גריד של כרטיסים */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 8px; height: 220px; object-fit: cover; cursor: pointer; }
        
        .joke-text { font-style: italic; font-size: 1.2em; color: var(--primary-color); line-height: 1.5; }
        .tag { display: inline-block; background: #fff3e0; color: var(--accent-color); padding: 4px 12px; border-radius: 20px; font-size: 0.85em; margin-top: 15px; font-weight: bold; }
        .caption { text-align: center; margin-top: 10px; font-weight: bold; color: #555; }

        h2 { border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; margin-top: 60px; color: var(--primary-color); }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; cursor: pointer;
        }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 10px; }

        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; }
            .random-box { border-right: none; border-top: 4px solid var(--accent-color); }
        }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
</div>

<header>
    <h1>ברק לב שלם</h1>
    <p>האתר לזכרו - חיוך, בדיחות וזכרונות</p>
</header>

<nav>
    <a href="#home">בית</a>
    <a href="#gallery">גלריה</a>
    <a href="#jokes">מאגר הבדיחות</a>
</nav>

<div class="container">
    <section id="home" class="hero">
        <div class="hero-img-box" id="hero-photo">
            </div>
        <div class="random-box">
            <h3>בדיחה של ברק:</h3>
            <div id="random-joke" class="joke-text">טוען חיוך...</div>
            <button onclick="displayRandomHero()" style="margin-top:20px; cursor:pointer; background:none; border:1px solid var(--accent-color); color:var(--accent-color); padding:5px 15px; border-radius:20px;">החלף בדיחה</button>
        </div>
    </section>

    <section id="gallery">
        <h2>גלריית תמונות</h2>
        <div id="gallery-content">טוען אלבומים...</div>
    </section>

    <section id="jokes">
        <h2>מאגר הבדיחות המלא</h2>
        <div id="all-jokes-grid" class="grid">טוען בדיחות...</div>
    </section>
</div>

<script>
    const JOKES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv';
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQejae0pWcPjbYrlj7cwqBPRxHN8o7hU0arrWV4QEVs3ap-VbhkvPjjhIsnXIovjQMggYbMbd0lwLe_/pub?gid=0&single=true&output=csv';

    let jokes = [];
    let photos = [];

    async function init() {
        try {
            const [jokesRes, photosRes] = await Promise.all([
                fetchData(JOKES_URL, true),
                fetchData(PHOTOS_URL, false)
            ]);
            jokes = jokesRes;
            photos = photosRes.slice(1);

            displayRandomHero();
            renderGallery();
            renderAllJokes();
        } catch (e) { console.error(e); }
    }

    function fetchData(url, hasHeader) {
        return new Promise((resolve) => {
            Papa.parse(url, { download: true, header: hasHeader, skipEmptyLines: true, complete: res => resolve(res.data) });
        });
    }

    // בדיחה ותמונה אקראית לראש הדף
    function displayRandomHero() {
        if (jokes.length > 0) {
            const rJ = jokes[Math.floor(Math.random() * jokes.length)];
            document.getElementById('random-joke').innerText = `"${rJ['Joke Content']}"`;
        }
        if (photos.length > 0) {
            const rP = photos[Math.floor(Math.random() * photos.length)];
            document.getElementById('hero-photo').innerHTML = `<img src="https://lh3.googleusercontent.com/d/${rP[1]}" alt="ברק">`;
        }
    }

    // רינדור הגלריה לפי אלבומים
    function renderGallery() {
        const container = document.getElementById('gallery-content');
        const albums = {};
        photos.forEach(row => {
            const [name, id, album] = row;
            if (id && album) {
                if (!albums[album]) albums[album] = [];
                albums[album].push({ id, name });
            }
        });

        let html = '';
        for (const [title, items] of Object.entries(albums)) {
            html += `<h3>${title}</h3><div class="grid" style="margin-bottom:40px;">`;
            html += items.map(p => `
                <div class="card">
                    <img src="https://lh3.googleusercontent.com/d/${p.id}" onclick="openLightbox(this.src)">
                    <p class="caption">${p.name}</p>
                </div>
            `).join('');
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    // רינדור כל הבדיחות למטה
    function renderAllJokes() {
        const container = document.getElementById('all-jokes-grid');
        container.innerHTML = jokes.map(j => `
            <div class="card">
                <p class="joke-text">"${j['Joke Content']}"</p>
                <span class="tag">${j['Categories'] || 'כללי'}</span>
            </div>
        `).join('');
    }

    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    window.onload = init;
</script>
</body>
</html>
