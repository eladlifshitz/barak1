<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ברק לב שלם - זיכרון</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .card { border: 1px solid #ccc; padding: 10px; width: 200px; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        #debug { color: red; background: #eee; padding: 10px; margin: 10px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <h1>לזכרו של ברק לב שלם</h1>
    <div id="debug"></div>
    <div id="joke" style="font-size: 1.5em; margin: 20px; color: orange;"></div>
    <div id="photos" class="gallery">טוען תמונות...</div>

    <script>
        const KEY = 'AIzaSyCKS2dCoAP3FJBlB-qp_qE9bsCAyyIv1vA';
        const FOLDER = '1jhuCr8n8QPxhv81QBNIlUdvAIfVvKfxV';

        // פונקציית טעינה פשוטה
        async function start() {
            const debugDiv = document.getElementById('debug');
            try {
                const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER}'+in+parent&fields=files(id,name)&key=${KEY}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    debugDiv.style.display = 'block';
                    debugDiv.innerText = "שגיאת גוגל: " + JSON.stringify(data.error, null, 2);
                    return;
                }

                if (data.files && data.files.length > 0) {
                    document.getElementById('photos').innerHTML = data.files.map(f => `
                        <div class="card">
                            <img src="https://lh3.googleusercontent.com/u/0/d/${f.id}">
                            <p>${f.name}</p>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('photos').innerText = "התיקייה נראית ריקה.";
                }
            } catch (e) {
                debugDiv.style.display = 'block';
                debugDiv.innerText = "שגיאת חיבור: " + e.message;
            }
        }

        // טעינת בדיחה
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv')
            .then(r => r.text()).then(text => {
                const rows = text.split('\n').slice(1);
                document.getElementById('joke').innerText = rows[Math.floor(Math.random() * rows.length)].split(',')[0];
            });

        start();
    </script>
</body>
</html>
