<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ברק לב שלם - זוכרים ומחייכים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #fdfdfd; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; }
        
        h1 { font-size: 2.5em; margin-bottom: 10px; color: var(--text); text-align: center; }
        .subtitle { color: #7f8c8d; margin-bottom: 40px; font-size: 1.2em; text-align: center; }

        /* כרטיס הבדיחה */
        .joke-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 60px; border-right: 12px solid var(--accent); text-align: center; }
        .joke-cat { color: var(--accent); font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 10px; }
        .joke-text { font-size: 1.8em; font-style: italic; color: #34495e; margin-bottom: 25px; display: block; }
        
        /* גלריה */
        .album-section { margin-top: 60px; text-align: right; }
        .album-title { font-size: 2.2em; border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 8px; margin-bottom: 30px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .photo-item { background: white; padding: 12px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.07); transition: 0.3s; }
        .photo-item:hover { transform: translateY(-8px); }
        .photo-item img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; cursor: pointer; }
        .photo-caption { margin-top: 12px; font-weight: 600; text-align: center; color: #555; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1em; font-weight: bold; }

        /* מנגנון ה-Lightbox (התמונה שנפתחת) */
        #lightbox {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; cursor: pointer;
        }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #lightbox .close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()">
    <span class="close">&times;</span>
    <img id="lightbox-img" src="">
</div>

<div class="container">
    <div id="loading-screen" style="text-align:center; margin-top:100px; font-size:1.5em; color:#95a5a6;">טוען זכרונות...</div>

    <div id="main-content" style="display:none;">
        <header>
            <h1>ברק לב שלם</h1>
            <p class="subtitle">זוכרים דרך החיוך וההומור</p>
        </header>

        <div class="joke-card">
            <span id="joke-cat" class="joke-cat"></span>
            <span id="joke-text" class="joke-text"></span>
            <button onclick="displayRandomJoke()">בדיחה נוספת 😊</button>
        </div>

        <div id="gallery-container"></div>
    </div>
</div>

<script>
    const JOKES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv';
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQejae0pWcPjbYrlj7cwqBPRxHN8o7hU0arrWV4QEVs3ap-VbhkvPjjhIsnXIovjQMggYbMbd0lwLe_/pub?gid=0&single=true&output=csv';

    let jokes = [];
    let photos = [];

    async function init() {
        try {
            const [jokesRes, photosRes] = await Promise.all([
                fetchData(JOKES_URL, true),
                fetchData(PHOTOS_URL, false)
            ]);
            jokes = jokesRes;
            photos = photosRes.slice(1);
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            displayRandomJoke();
            renderGallery();
        } catch (e) { console.error(e); }
    }

    function fetchData(url, hasHeader) {
        return new Promise((resolve) => {
            Papa.parse(url, { download: true, header: hasHeader, skipEmptyLines: true, complete: res => resolve(res.data) });
        });
    }

    function displayRandomJoke() {
        if (jokes.length > 0) {
            const item = jokes[Math.floor(Math.random() * jokes.length)];
            document.getElementById('joke-cat').innerText = item['Categories'] || "כללי";
            document.getElementById('joke-text').innerText = `"${item['Joke Content']}"`;
        }
    }

    function renderGallery() {
        const container = document.getElementById('gallery-container');
        const albums = {};
        photos.forEach(row => {
            const name = row[0], id = row[1], album = row[2];
            if (id && album) {
                if (!albums[album]) albums[album] = [];
                albums[album].push({ id, name });
            }
        });

        let html = '';
        for (const [title, items] of Object.entries(albums)) {
            html += `
                <div class="album-section">
                    <h2 class="album-title">${title}</h2>
                    <div class="photo-grid">
                        ${items.map(p => `
                            <div class="photo-item">
                                <img src="https://lh3.googleusercontent.com/d/${p.id}" onclick="openLightbox(this.src)">
                                <div class="photo-caption">${p.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }
        container.innerHTML = html;
    }

    // פונקציות ה-Lightbox
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
