<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ברק לב שלם - זוכרים ומחייכים</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #fdfdfd; text-align: center; padding: 50px; }
        .joke-box { background: #fff3e0; border-right: 8px solid #e67e22; padding: 30px; border-radius: 15px; max-width: 700px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #joke-text { font-size: 1.8em; font-style: italic; color: #333; }
        .error { color: red; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>ברק לב שלם</h1>
    
    <div class="joke-box">
        <div id="joke-text">טוען בדיחה...</div>
    </div>
    
    <div id="debug" class="error"></div>

    <script>
        // הדבק כאן את הקישור שקיבלת מה-"Publish to web"
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv';

        async function loadJoke() {
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("לא הצלחתי למשוך את הקובץ");
                
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));
                
                // לוקחים את הבדיחות (עמודה A) ומדלגים על הכותרת
                const jokes = rows.slice(1).filter(r => r[0] && r[0].trim() !== "");
                
                if (jokes.length > 0) {
                    const randomJoke = jokes[Math.floor(Math.random() * jokes.length)];
                    document.getElementById('joke-text').innerText = `"${randomJoke[0].trim()}"`;
                }
            } catch (err) {
                document.getElementById('debug').innerText = "שגיאה: " + err.message;
            }
        }

        loadJoke();
    </script>
</body>
</html>
