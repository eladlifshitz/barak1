<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ברק לב שלם - זוכרים ומחייכים</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; text-align: center; padding: 40px; }
        .joke-box { background: #fff3e0; border-right: 8px solid #e67e22; padding: 30px; border-radius: 15px; max-width: 600px; margin: 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; }
        #joke-text { font-size: 1.6em; font-style: italic; color: #333; }
        #debug { color: #721c24; background: #f8d7da; padding: 15px; border-radius: 5px; margin: 20px auto; max-width: 600px; display: none; direction: ltr; }
    </style>
</head>
<body>

    <h1>ברק לב שלם</h1>
    
    <div id="debug"></div>

    <div id="joke-container" class="joke-box">
        <small id="category" style="color: #e67e22; font-weight: bold;"></small>
        <div id="joke-text"></div>
    </div>

    <script>
        // *** הדבק כאן את הקישור שהעתקת בסוף שלב 1 ***
        const rawUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv'; 

        async function init() {
            const debug = document.getElementById('debug');
            const container = document.getElementById('joke-container');

            try {
                // ניקוי הקישור מרווחים או תווים נסתרים
                const cleanUrl = rawUrl.trim();
                
                const response = await fetch(cleanUrl);
                if (!response.ok) throw new Error("Google returned status: " + response.status);
                
                const text = await response.text();
                
                // עיבוד השורות - מתמודד גם עם פסיקים בתוך מרכאות
                const rows = text.split('\n').map(r => r.split(','));
                const validRows = rows.slice(1).filter(r => r.length > 1 && r[1].trim() !== "");

                if (validRows.length > 0) {
                    const randomRow = validRows[Math.floor(Math.random() * validRows.length)];
                    document.getElementById('category').innerText = randomRow[0].replace(/"/g, '');
                    document.getElementById('joke-text').innerText = `"${randomRow[1].replace(/"/g, '').trim()}"`;
                    container.style.display = 'block';
                } else {
                    throw new Error("No data found in the sheet.");
                }

            } catch (err) {
                debug.style.display = 'block';
                debug.innerText = "Error: " + err.message + "\nCheck if the link is published as CSV.";
            }
        }

        init();
    </script>
</body>
</html>
