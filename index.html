<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ברק לב שלם - לזכרו</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fdfdfd; padding: 20px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .card { border: 1px solid #eee; padding: 10px; width: 220px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        #joke { font-size: 1.5em; margin: 30px auto; color: #e67e22; max-width: 700px; font-style: italic; }
        #debug-box { color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; display: none; margin: 20px auto; max-width: 600px; text-align: left; direction: ltr; }
    </style>
</head>
<body>
    <h1>ברק לב שלם</h1>
    <div id="debug-box"></div>
    <div id="joke">טוען חיוך...</div>
    <hr style="width: 30%; opacity: 0.2; margin: 30px auto;">
    <h2>זכרונות בתמונות</h2>
    <div id="photos" class="gallery">טוען תמונות...</div>

    <script>
        const KEY = 'AIzaSyCKS2dCoAP3FJBlB-qp_qE9bsCAyyIv1vA';
        const FOLDER = '1jhuCr8n8QPxhv81QBNIlUdvAIfVvKfxV';

        async function loadPhotos() {
            const photosDiv = document.getElementById('photos');
            const debugBox = document.getElementById('debug-box');

            // שיטת ה-List הפשוטה ביותר - בלי שאילתות Q מורכבות
            const url = `https://www.googleapis.com/drive/v3/files?pageSize=50&fields=files(id,name,mimeType)&q='${FOLDER}'+in+parent&key=${KEY}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    debugBox.style.display = 'block';
                    debugBox.innerText = `Google Error (${data.error.code}): ${data.error.message}`;
                    return;
                }

                if (data.files && data.files.length > 0) {
                    // סינון לקבצי תמונה בלבד כאן בקוד שלנו, לא בשאילתה של גוגל
                    const images = data.files.filter(f => f.mimeType.includes('image'));
                    
                    if (images.length === 0) {
                        photosDiv.innerText = "לא נמצאו תמונות בתיקייה.";
                        return;
                    }

                    photosDiv.innerHTML = images.map(f => {
                        const imgUrl = `https://lh3.googleusercontent.com/d/${f.id}`;
                        return `
                            <div class="card">
                                <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/200?text=תמונה'">
                                <p style="font-size:0.9em; margin-top:8px; font-weight:bold;">${f.name.split('.')[0]}</p>
                            </div>
                        `;
                    }).join('');
                } else {
                    photosDiv.innerText = "התיקייה נראית ריקה.";
                }
            } catch (e) {
                debugBox.style.display = 'block';
                debugBox.innerText = "Connection Error: " + e.message;
            }
        }

        // טעינת בדיחה (זה החלק שעובד יציב)
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTWYpyL6NDKTU7HpYkz_7c7fLbqmYIavcgp0facG7tqZozKViewPdRWygSA39zneHNg1jpo1Upk8DGb/pub?output=csv')
            .then(r => r.text()).then(text => {
                const rows = text.split('\n').slice(1);
                if(rows.length > 0) {
                    const randomLine = rows[Math.floor(Math.random() * rows.length)];
                    document.getElementById('joke').innerText = `"${randomLine.split(',')[0]}"`;
                }
            });

        loadPhotos();
    </script>
</body>
</html>
